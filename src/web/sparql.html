<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OMRYA Code Intelligence Console</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030604;
        --panel: #070b08;
        --panel-2: #0b120d;
        --panel-3: #111913;
        --line: #1f2d22;
        --line-bright: #34513a;
        --text: #dbe6d8;
        --muted: #7e8b7b;
        --blue: #38c8ff;
        --red: #ff5f5f;
        --green: #37e33f;
        --yellow: #f4b73f;
        --purple: #b05cff;
        --orange: #f28f3b;
        --black: #020403;
        --ink: #050706;
        --focus: rgba(55, 227, 63, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(55, 227, 63, 0.04) 1px, transparent 1px),
          linear-gradient(0deg, rgba(55, 227, 63, 0.035) 1px, transparent 1px),
          linear-gradient(135deg, rgba(56, 200, 255, 0.08), transparent 34%),
          #020403;
        background-size: 96px 96px, 96px 96px, auto, auto;
        color: var(--text);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, ui-monospace, monospace;
        letter-spacing: 0;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      #app {
        height: 100vh;
      }

      .shell {
        display: grid;
        grid-template-rows: 64px minmax(0, 1fr) 34px;
        height: 100vh;
        min-height: 0;
        overflow: hidden;
        border: 1px solid #182219;
        background: rgba(2, 4, 3, 0.9);
      }

      .topbar {
        display: grid;
        grid-template-columns: 248px minmax(420px, 1fr) 292px;
        align-items: stretch;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(7, 12, 8, 0.96), rgba(3, 6, 4, 0.96));
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 18px;
        border-right: 1px solid #172417;
      }

      .seal {
        display: grid;
        place-items: center;
        width: 46px;
        height: 38px;
        border: 1px solid rgba(55, 227, 63, 0.62);
        border-radius: 4px;
        background:
          linear-gradient(90deg, transparent 49%, rgba(55, 227, 63, 0.22) 50%, transparent 51%),
          linear-gradient(0deg, transparent 49%, rgba(55, 227, 63, 0.22) 50%, transparent 51%),
          #050805;
        color: var(--green);
        font-size: 11px;
        font-weight: 800;
      }

      .brand-title {
        color: #f2f8ef;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        line-height: 1.1;
        text-transform: uppercase;
      }

      .brand-subtitle {
        margin-top: 5px;
        color: var(--muted);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .nav {
        display: flex;
        min-width: 0;
      }

      .nav-item {
        display: grid;
        place-items: center;
        min-width: 84px;
        padding: 0 12px;
        border-right: 1px solid rgba(29, 51, 67, 0.35);
        color: #7f8b7d;
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .nav-item.active {
        color: #dffbdd;
        background: linear-gradient(180deg, rgba(55, 227, 63, 0.15), rgba(55, 227, 63, 0.02));
        border-bottom: 2px solid var(--green);
      }

      .repo-ingest-bar {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) 120px 148px;
        align-items: center;
        gap: 8px;
        min-width: 0;
        padding: 12px 14px;
        border-right: 1px solid #172417;
        position: relative;
      }

      .repo-ingest-bar .input,
      .repo-ingest-bar .select {
        height: 34px;
      }

      .ingest-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
      }

      .spinner {
        width: 12px;
        height: 12px;
        border: 2px solid rgba(255, 255, 255, 0.24);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      .ingest-progress {
        position: absolute;
        left: 14px;
        right: 14px;
        bottom: 3px;
        display: grid;
        gap: 3px;
        pointer-events: none;
      }

      .ingest-track {
        position: relative;
        height: 3px;
        overflow: hidden;
        background: #102113;
      }

      .ingest-track::before {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 34%;
        background: linear-gradient(90deg, transparent, var(--green), transparent);
        animation: ingest-slide 1.15s ease-in-out infinite;
      }

      .ingest-steps {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        color: #82a080;
        font-size: 8px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
      }

      .ingest-steps .active {
        color: #e8ffe6;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes ingest-slide {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(310%);
        }
      }

      .clearance {
        display: grid;
        grid-template-columns: 1fr;
        align-items: center;
        border-left: 1px solid #172417;
      }

      .clearance-meta {
        padding: 0 14px;
        color: #8d998a;
        font-size: 10px;
        font-weight: 700;
        line-height: 1.55;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .toolbar-icons {
        display: flex;
        justify-content: space-around;
        color: #7f8b7d;
        font-size: 16px;
      }

      .main {
        display: grid;
        grid-template-columns: 220px minmax(0, 1fr) 320px;
        min-height: 0;
        overflow: hidden;
      }

      .sidebar,
      .details {
        min-height: 0;
        overflow: auto;
        background: rgba(4, 8, 5, 0.9);
      }

      .sidebar {
        border-right: 1px solid var(--line);
      }

      .details {
        border-left: 1px solid var(--line);
      }

      .panel {
        border-bottom: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(12, 18, 13, 0.92), rgba(5, 9, 6, 0.92));
        min-height: 0;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        min-height: 34px;
        padding: 0 12px;
        border-bottom: 1px solid #1a261b;
        background: rgba(5, 8, 6, 0.66);
        color: #aebaaa;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .panel-body {
        padding: 12px;
        min-height: 0;
      }

      .explain {
        margin-bottom: 10px;
        padding: 9px 10px;
        border: 1px solid #213323;
        border-radius: 6px;
        background: rgba(7, 12, 8, 0.88);
        color: #aebdab;
        font-size: 11px;
        line-height: 1.45;
      }

      .explain strong {
        color: #e9fbe6;
      }

      .search-row {
        display: grid;
        grid-template-columns: 1fr 30px;
        gap: 6px;
        margin-bottom: 10px;
      }

      .input,
      .select,
      .textarea {
        width: 100%;
        border: 1px solid #223324;
        border-radius: 6px;
        outline: none;
        background: #050805;
        color: var(--text);
      }

      .input,
      .select {
        height: 30px;
        padding: 0 9px;
        font-size: 12px;
      }

      .textarea {
        height: clamp(116px, 17vh, 170px);
        min-height: 96px;
        resize: vertical;
        padding: 12px;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        line-height: 1.55;
      }

      .input:focus,
      .select:focus,
      .textarea:focus {
        border-color: #37e33f;
        box-shadow: 0 0 0 2px var(--focus);
      }

      .icon-btn,
      .button {
        border: 1px solid #2b3d2d;
        border-radius: 6px;
        background: #0b100c;
        color: #c7d8c3;
      }

      .icon-btn {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
      }

      .button {
        min-height: 32px;
        padding: 0 13px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .button:hover,
      .chip:hover {
        border-color: var(--green);
        color: #e7ffe5;
      }

      .button.primary {
        background: #143d18;
        border-color: #37e33f;
        color: #f3fff1;
      }

      .button.danger {
        border-color: #743333;
        color: #ffc5c1;
      }

      .button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      .tree {
        display: grid;
        gap: 8px;
        color: #a6b3a2;
        font-size: 11px;
      }

      .tree-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .tree-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .folder {
        color: var(--green);
      }

      .lock {
        color: #758271;
      }

      .kv {
        display: grid;
        gap: 9px;
        color: #82907f;
        font-size: 11px;
      }

      .kv-row {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 8px;
      }

      .kv-value {
        color: #c6d5c2;
      }

      .healthy {
        color: var(--green);
      }

      .workspace {
        display: grid;
        grid-template-rows: minmax(250px, 1fr) minmax(220px, 38%);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .graph-panel {
        position: relative;
        min-height: 0;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(rgba(55, 227, 63, 0.045) 1px, transparent 1px),
          linear-gradient(90deg, rgba(55, 227, 63, 0.045) 1px, transparent 1px),
          linear-gradient(135deg, rgba(56, 200, 255, 0.06), transparent 44%),
          rgba(3, 7, 4, 0.92);
        background-size: 28px 28px, 28px 28px, auto, auto;
      }

      .graph-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 46px;
        padding: 0 14px;
        border-bottom: 1px solid rgba(31, 45, 34, 0.86);
        background: rgba(3, 6, 4, 0.74);
      }

      .graph-title {
        color: #dbe8d7;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.07em;
        text-transform: uppercase;
      }

      .graph-tools {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .graph-tools .select {
        width: 104px;
        height: 26px;
        font-size: 10px;
        text-transform: uppercase;
      }

      .inferred {
        display: flex;
        align-items: center;
        gap: 6px;
        color: #a9bcc9;
        font-size: 10px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .graph-stage {
        position: absolute;
        inset: 46px 0 0;
      }

      .sigma-stage {
        position: absolute;
        inset: 0;
      }

      .sigma-canvas {
        position: absolute;
        inset: 0;
      }

      .graph-overlay {
        position: absolute;
        left: 14px;
        top: 12px;
        display: grid;
        gap: 8px;
        width: min(340px, calc(100% - 28px));
        pointer-events: none;
      }

      .graph-summary {
        width: fit-content;
        max-width: 100%;
        padding: 8px 10px;
        border: 1px solid rgba(52, 81, 58, 0.92);
        border-radius: 6px;
        background: rgba(4, 8, 5, 0.82);
        color: #d4e2d0;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .graph-status {
        min-height: 34px;
        padding: 9px 10px;
        border: 1px solid #223324;
        border-radius: 6px;
        background: rgba(5, 8, 6, 0.88);
        color: #aebdab;
        font-size: 11px;
        overflow-wrap: anywhere;
      }

      .graph-status.error {
        border-color: #6d302f;
        color: #ffc4c1;
      }

      .edges {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .node {
        position: absolute;
        display: grid;
        justify-items: center;
        gap: 6px;
        width: 140px;
        margin-left: -70px;
        margin-top: -46px;
        text-align: center;
        color: #b8c8d2;
        font-size: 11px;
      }

      .node-core {
        display: grid;
        place-items: center;
        width: 48px;
        height: 48px;
        border: 2px solid currentColor;
        border-radius: 50%;
        background: rgba(6, 10, 7, 0.92);
        box-shadow: 0 0 22px color-mix(in srgb, currentColor 35%, transparent);
        font-size: 21px;
        font-weight: 900;
      }

      .node.red {
        color: var(--red);
      }

      .node.blue {
        color: var(--blue);
      }

      .node.green {
        color: var(--green);
      }

      .node.yellow {
        color: var(--yellow);
      }

      .node.purple {
        color: var(--purple);
      }

      .node.orange {
        color: var(--orange);
      }

      .node-label {
        max-width: 132px;
        color: #d8e6d4;
        overflow-wrap: anywhere;
      }

      .node-type {
        color: #869482;
      }

      .legend {
        position: absolute;
        left: 14px;
        bottom: 12px;
        width: 116px;
        padding: 10px;
        border: 1px solid #223324;
        border-radius: 6px;
        background: rgba(4, 8, 5, 0.82);
        font-size: 10px;
      }

      .legend-row {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-top: 6px;
        color: #b4c4b0;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }

      .minimap {
        position: absolute;
        right: 16px;
        bottom: 12px;
        width: 140px;
        height: 94px;
        border: 1px solid #34513a;
        background: rgba(4, 8, 5, 0.78);
      }

      .bottom {
        display: grid;
        grid-template-columns: minmax(320px, 0.9fr) minmax(360px, 1.4fr);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }

      .editor-panel {
        border-right: 1px solid var(--line);
        display: grid;
        grid-template-rows: 34px minmax(0, 1fr);
        overflow: hidden;
      }

      .editor-panel .panel-body {
        overflow: auto;
      }

      .editor-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: 10px;
      }

      .samples {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .dataset-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
        margin-bottom: 10px;
      }

      .dataset-grid .button {
        min-width: 0;
        white-space: normal;
        line-height: 1.25;
        padding-top: 6px;
        padding-bottom: 6px;
      }

      .evidence-list {
        display: grid;
        gap: 8px;
      }

      .evidence-item {
        padding: 9px;
        border: 1px solid #213323;
        border-radius: 6px;
        background: #070b08;
      }

      .evidence-predicate {
        color: var(--blue);
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      .evidence-text {
        margin-top: 5px;
        color: #c9d8c5;
        font-size: 11px;
        line-height: 1.35;
        overflow-wrap: anywhere;
      }

      .chip {
        border: 1px solid #2b3d2d;
        border-radius: 6px;
        background: #0b100c;
        color: #bad0b5;
        padding: 5px 7px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .results-panel {
        min-width: 0;
        display: grid;
        grid-template-rows: 34px minmax(0, 1fr);
        overflow: hidden;
      }

      .results-panel .panel-body {
        overflow: hidden;
      }

      .results-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        color: #859381;
        font-size: 10px;
      }

      .table-wrap {
        overflow: auto;
        height: 100%;
        max-height: none;
      }

      .virtual-table {
        min-width: 680px;
        border: 1px solid #1c2a1e;
        border-radius: 6px;
        overflow: hidden;
      }

      .virtual-head,
      .virtual-row {
        display: grid;
        align-items: stretch;
      }

      .virtual-head {
        position: sticky;
        top: 0;
        z-index: 2;
        background: #0a100b;
      }

      .virtual-scroll {
        position: relative;
        height: min(232px, calc(38vh - 92px));
        min-height: 120px;
        overflow: auto;
        background: #050805;
      }

      .virtual-spacer {
        position: relative;
        min-width: 100%;
      }

      .virtual-row {
        position: absolute;
        left: 0;
        right: 0;
        min-height: 34px;
        border-bottom: 1px solid #1c2a1e;
        background: rgba(5, 8, 6, 0.94);
        cursor: pointer;
      }

      .virtual-row:hover,
      .virtual-row.hovered {
        background: rgba(27, 61, 31, 0.72);
      }

      .virtual-row.selected {
        background: rgba(20, 61, 24, 0.72);
        box-shadow: inset 3px 0 0 var(--green);
      }

      .virtual-cell {
        min-width: 0;
        padding: 9px 10px;
        color: #c8d7c4;
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        border-right: 1px solid #1c2a1e;
      }

      .virtual-head .virtual-cell {
        color: #aab7a6;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 11px;
      }

      th,
      td {
        min-width: 120px;
        padding: 9px 10px;
        border-bottom: 1px solid #1c2a1e;
        text-align: left;
        vertical-align: top;
      }

      th {
        position: sticky;
        top: 0;
        background: #0a100b;
        color: #aab7a6;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.05em;
        text-transform: uppercase;
      }

      td {
        color: #c8d7c4;
        overflow-wrap: anywhere;
      }

      .raw {
        margin: 0;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        color: #c9d8c5;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 11px;
        line-height: 1.55;
      }

      .details-card {
        margin: 12px;
        border: 1px solid #213323;
        border-radius: 6px;
        background: rgba(7, 12, 8, 0.86);
      }

      .entity-head {
        display: grid;
        grid-template-columns: 48px 1fr;
        gap: 12px;
        align-items: center;
        padding: 14px;
      }

      .avatar {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        border: 2px solid var(--green);
        border-radius: 6px;
        color: var(--green);
        font-size: 21px;
        font-weight: 900;
      }

      .entity-name {
        font-size: 14px;
        font-weight: 800;
      }

      .entity-sub {
        margin-top: 3px;
        color: var(--muted);
        font-size: 11px;
      }

      .properties {
        width: 100%;
      }

      .status {
        min-height: 38px;
        margin-top: 10px;
        padding: 10px;
        border: 1px solid #213323;
        border-radius: 6px;
        background: #070b08;
        color: #aebdab;
        font-size: 11px;
        overflow-wrap: anywhere;
      }

      .status.error {
        border-color: #6d302f;
        color: #ffc4c1;
      }

      .status.ok {
        border-color: #2f6634;
        color: #caffc7;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 0;
        padding: 0 16px;
        border-top: 1px solid var(--line);
        background: #030503;
        color: #788575;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .footer-left {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .pulse {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 10px rgba(143, 209, 106, 0.8);
      }

      /* Intelligence-console skin inspired by the OMRYA reference UI. */
      :root {
        --bg: #020812;
        --panel: #07111c;
        --panel-2: #0a1624;
        --panel-3: #0d1b2b;
        --line: #13283c;
        --line-bright: #254762;
        --text: #d8e5ef;
        --muted: #7c8ca1;
        --blue: #2f9cff;
        --red: #ff6673;
        --green: #69df78;
        --yellow: #efc84a;
        --purple: #b76eff;
        --orange: #f59f54;

            if (Array.isArray(body.datasets) && body.datasets.length) {
              setDatasets(body.datasets);
              setQuery(body.datasets[0].query || AVR_QUERY_ALL);
              setGraphStatus("Server advertised " + body.datasets.length + " AVR memory datasets. Load one to persist it into the RDF store.");

            setDatasets(fallbackDatasetCatalog);

            const response = await fetch(path, { method: "POST" });
            const body = await response.text();
            if (!response.ok) throw new Error(body.trim() || response.statusText);
            const nextToken = body.trim();
            localStorage.setItem("omrya.session", nextToken);
            setToken(nextToken);
            setStatus({ tone: "ok", text: "Signed in as " + user + "." });
            await refreshLogs(nextToken);
            await refreshMetrics();
            return nextToken;
          } catch (error) {
            setStatus({ tone: "error", text: error.message });
            throw error;
          } finally {
            setBusy(false);
          }
        }

        async function ensureToken() {

          setBusy(true);
          setStatus({ tone: "", text: "Dispatching SPARQL request..." });

          try {
            const params = new URLSearchParams();
            if (auths.trim()) params.set("query.auth", auths.trim());
            if (visibility.trim()) params.set("conf.cv", visibility.trim());
            if (resultFormat) params.set("query.resultformat", resultFormat);
            const response = await fetch("/sparql?" + params.toString(), {
              method: "POST",
              headers: {
                "Content-Type": "text/plain; charset=utf-8",
                "X-Omrya-Token": token,
              },
              body: query,
            });
            const body = await response.text();
            if (!response.ok) throw new Error(body.trim() || response.statusText);
            const parsed = parseSparqlResult(body);
            setResult(parsed);
            if (parsed.rows.length) {
              setGraphRows(parsed.rows);
              setSelectedRowKey(rowKey(parsed.rows[0], 0));
              setSelectedNode(parsed.rows[0].s || parsed.rows[0].o || "");
              setGraphStatus("Graph updated from " + parsed.rows.length + " query result row" + (parsed.rows.length === 1 ? "" : "s") + ".");
            } else if (parsed.raw) {
              setSelectedRowKey("");
              setSelectedNode("");
              setGraphStatus("No graphable rows returned for this query.");
            }
            const elapsed = Math.round(performance.now() - started);
            const rows = parsed.rows.length;
            const detail = body.trim() ? rows + " result row" + (rows === 1 ? "" : "s") : "update accepted";
            setStatus({ tone: "ok", text: detail + " in " + elapsed + " ms." });
            await refreshLogs();
            await refreshMetrics();
          } catch (error) {
            setStatus({ tone: "error", text: error.message });
          } finally {
            setBusy(false);
          }
        }

          try {
            const session = await ensureToken();
            let rows;
            let nextQuery = dataset.query || AVR_QUERY_ALL;
            if (dataset.name && !dataset.triples) {
              const response = await fetch("/avr/seed?dataset=" + encodeURIComponent(dataset.name), {
                method: "POST",
                headers: { "X-Omrya-Token": session },
              });
              const body = await response.text();
              if (!response.ok) throw new Error(body.trim() || response.statusText);
              const seeded = JSON.parse(body);
              rows = Array.isArray(seeded.rows) ? seeded.rows : [];
              nextQuery = seeded.query || nextQuery;
            } else {
              const insert = "INSERT DATA { " + dataset.triples.map((triple) =>
                ntTerm(triple[0]) + " " + ntTerm(triple[1]) + " " + ntTerm(triple[2]) + " ."
              ).join(" ") + " }";
              const response = await fetch("/sparql", {
                method: "POST",
                headers: {
                  "Content-Type": "text/plain; charset=utf-8",
                  "X-Omrya-Token": session,
                },
                body: insert,
              });
              const body = await response.text();
              if (!response.ok) throw new Error(body.trim() || response.statusText);
              rows = rowsFromTriples(dataset.triples);
            }
            setGraphRows(rows);
            setGraphStatus("Loaded " + dataset.label + " into the triplestore and graphed " + rows.length + " triples.");

            setResult({ columns: ["s", "p", "o", "g"], rows, raw: "" });

      function SigmaGraph(props) {
        const containerRef = useRef(null);
        const rendererRef = useRef(null);
        const graphRef = useRef(null);
        const edgeRowsRef = useRef(new Map());
        const rowNodesRef = useRef(new Map());
        const [error, setError] = useState("");
        const visualEntries = useMemo(() => graphRowsForVisualization(props.rows), [props.rows]);

        useEffect(() => {
          const container = containerRef.current;
          if (!container) return;
          if (rendererRef.current) {
            rendererRef.current.kill();
            rendererRef.current = null;
          }
          graphRef.current = null;
          edgeRowsRef.current = new Map();
          rowNodesRef.current = new Map();
          container.innerHTML = "";

          const Graph = window.graphology && (window.graphology.Graph || window.graphology);
          const SigmaCtor = window.Sigma && (window.Sigma.default || window.Sigma);
          if (!Graph || !SigmaCtor) {
            setError("Sigma.js or Graphology did not load from cdnjs.");
            return;
          }

          try {
            const graph = new Graph({ multi: true, type: "directed" });
            const entries = visualEntries;
            const rows = entries.map((entry) => entry.row);
            const radius = Math.max(4, Math.sqrt(Math.max(entries.length, 1)) * 1.8);
            const values = Array.from(new Set(rows.flatMap((row) => [row.s, row.o]).filter(Boolean)));
            const degree = new Map();
            rows.forEach((row) => {
              degree.set(row.s, (degree.get(row.s) || 0) + 1);
              degree.set(row.o, (degree.get(row.o) || 0) + 1);
            });
            const edgePairs = [];
            values.forEach((value, index) => {
              const angle = (Math.PI * 2 * index) / Math.max(values.length, 1);
              const isSubject = rows.some((row) => row.s === value);
              const isLiteral = !looksLikeIri(value);
              const nodeDegree = degree.get(value) || 1;
              graph.addNode(value, {
                label: shouldLabelGraphNode(value, nodeDegree, entries.length) ? compactLabel(value) : "",
                x: Math.cos(angle) * radius,
                y: Math.sin(angle) * radius,
                size: Math.min(9, (isSubject ? 4.8 : 3.8) + Math.sqrt(nodeDegree) * 0.8),
                color: isLiteral ? "#f28f3b" : isSubject ? "#38c8ff" : "#37e33f",
                labelColor: "#d8e5ef",
              });
            });
            entries.forEach((entry) => {
              const row = entry.row;
              const index = entry.index;
              if (!row.s || !row.o || !graph.hasNode(row.s) || !graph.hasNode(row.o)) return;
              const key = rowKey(row, index);
              const edgeKey = "edge:" + key;
              rowNodesRef.current.set(key, [row.s, row.o]);
              edgeRowsRef.current.set(edgeKey, key);
              edgePairs.push({ source: row.s, target: row.o, key: edgeKey });
              graph.addDirectedEdgeWithKey(edgeKey, row.s, row.o, {
                label: "",
                color: row.p && row.p.endsWith("#type") ? "#b05cff" : "#5d6e5a",
                size: row.p && row.p.endsWith("#type") ? 1.4 : 0.8,
                rowKey: key,
              });
            });
            graphRef.current = graph;
            const renderer = new SigmaCtor(graph, container, {
              allowInvalidContainer: true,
              labelColor: { attribute: "labelColor", color: "#dbe6d8" },
              labelSize: 10,
              labelRenderedSizeThreshold: 8,
              renderEdgeLabels: false,
              edgeLabelSize: 8,
              defaultEdgeColor: "#5d6e5a",
              defaultNodeColor: "#38c8ff",
              defaultDrawNodeHover: drawReadableHoverLabel,
            });
            rendererRef.current = renderer;

            if (typeof renderer.on === "function") {
              renderer.on("clickNode", ({ node }) => {
                const match = entries.find((entry) => entry.row.s === node || entry.row.o === node);
                props.setSelectedNode(node);
                if (match) props.setSelectedRowKey(rowKey(match.row, match.index));
              });
              renderer.on("clickEdge", ({ edge }) => {
                const key = edgeRowsRef.current.get(edge);
                if (key) props.setSelectedRowKey(key);
              });
              renderer.on("enterNode", ({ node }) => {
                const match = entries.find((entry) => entry.row.s === node || entry.row.o === node);
                if (match) props.setHoveredRowKey(rowKey(match.row, match.index));
              });
              renderer.on("leaveNode", () => props.setHoveredRowKey(""));
            }

            const velocities = new Map(values.map((node) => [node, { x: 0, y: 0 }]));
            const pinned = new Set();
            let dragged = null;
            if (typeof renderer.on === "function") {
              renderer.on("downNode", (event) => {
                dragged = event.node;
                pinned.add(dragged);
                if (event.event && typeof event.event.preventSigmaDefault === "function") event.event.preventSigmaDefault();
                if (event.event && event.event.original) event.event.original.preventDefault();
              });
            }
            const captor = typeof renderer.getMouseCaptor === "function" ? renderer.getMouseCaptor() : null;
            if (captor && typeof captor.on === "function") {
              captor.on("mousemovebody", (event) => {
                if (!dragged || typeof renderer.viewportToGraph !== "function") return;
                const point = renderer.viewportToGraph({ x: event.x, y: event.y });
                graph.setNodeAttribute(dragged, "x", point.x);
                graph.setNodeAttribute(dragged, "y", point.y);
                const velocity = velocities.get(dragged);
                if (velocity) {
                  velocity.x = 0;
                  velocity.y = 0;
                }
                renderer.refresh();
              });
              captor.on("mouseup", () => {
                if (dragged) pinned.delete(dragged);
                dragged = null;
              });
              captor.on("mouseupbody", () => {
                if (dragged) pinned.delete(dragged);
                dragged = null;
              });
            }

            const timer = window.setInterval(() => {
              if (!graphRef.current || !values.length) return;
              const positions = new Map(values.map((node) => [node, graph.getNodeAttributes(node)]));
              for (let i = 0; i < values.length; i++) {
                for (let j = i + 1; j < values.length; j++) {
                  const a = values[i];
                  const b = values[j];
                  const pa = positions.get(a);
                  const pb = positions.get(b);
                  const dx = (pa.x || 0) - (pb.x || 0);
                  const dy = (pa.y || 0) - (pb.y || 0);
                  const distanceSq = Math.max(0.08, dx * dx + dy * dy);
                  const force = Math.min(0.22, 0.9 / distanceSq);
                  const distance = Math.sqrt(distanceSq);
                  const fx = (dx / distance) * force;
                  const fy = (dy / distance) * force;
                  velocities.get(a).x += fx;
                  velocities.get(a).y += fy;
                  velocities.get(b).x -= fx;
                  velocities.get(b).y -= fy;
                }
              }
              edgePairs.forEach((edge) => {
                const source = positions.get(edge.source);
                const target = positions.get(edge.target);
                if (!source || !target) return;
                const dx = (target.x || 0) - (source.x || 0);
                const dy = (target.y || 0) - (source.y || 0);
                const distance = Math.max(0.1, Math.sqrt(dx * dx + dy * dy));
                const targetDistance = 2.4;
                const force = (distance - targetDistance) * 0.008;
                const fx = (dx / distance) * force;
                const fy = (dy / distance) * force;
                velocities.get(edge.source).x += fx;
                velocities.get(edge.source).y += fy;
                velocities.get(edge.target).x -= fx;
                velocities.get(edge.target).y -= fy;
              });
              values.forEach((node) => {
                if (pinned.has(node)) return;
                const attrs = positions.get(node);
                const velocity = velocities.get(node);
                velocity.x += -(attrs.x || 0) * 0.002;
                velocity.y += -(attrs.y || 0) * 0.002;
                velocity.x *= 0.86;
                velocity.y *= 0.86;
                graph.setNodeAttribute(node, "x", (attrs.x || 0) + velocity.x);
                graph.setNodeAttribute(node, "y", (attrs.y || 0) + velocity.y);
              });
              renderer.refresh();
            }, 34);

            applyGraphHighlight(graph, renderer, rowNodesRef.current, props.selectedRowKey, props.hoveredRowKey, props.selectedNode);
            setError("");
            return () => {
              window.clearInterval(timer);
              if (rendererRef.current) {
                rendererRef.current.kill();
                rendererRef.current = null;
              }
            };
          } catch (error) {
            setError(error.message);
          }
        }, [visualEntries]);

        useEffect(() => {
          if (!graphRef.current || !rendererRef.current) return;
          applyGraphHighlight(graphRef.current, rendererRef.current, rowNodesRef.current, props.selectedRowKey, props.hoveredRowKey, props.selectedNode);
        }, [props.selectedRowKey, props.hoveredRowKey, props.selectedNode]);

        return h("div", { className: "sigma-stage" },
          h("div", { className: "sigma-canvas", ref: containerRef }),
            h("div", { className: "graph-overlay" },
              h("div", { className: "graph-summary" }, visualEntries.length + " / " + props.rows.length + " triples visualized"),
              h("div", { className: "graph-status" + (error ? " error" : "") },
              error || props.status
            )
          )
        );
      }

      function explainSelectedNode(node, nodeTypes, outgoingCount, incomingCount) {
        const typeText = nodeTypes.join(", ");
        const label = compactLabel(node);
        const kind = typeText || "RDF resource";
        if (/CodeQueryProbe/.test(typeText)) {
          return label + " is a generated analysis query/test idea. Outgoing facts describe what it checks; incoming facts show which hypothesis created it.";
        }
        if (/VulnerabilityHypothesis/.test(typeText)) {
          return label + " is a possible issue. Follow outgoing facts to probes and evidence before treating it as real.";
        }
        if (/Evidence/.test(typeText)) {
          return label + " is supporting evidence such as a path, line, or snippet from the analyzed repo.";
        }
        return label + " is a " + kind + " with " + outgoingCount + " outgoing and " + incomingCount + " incoming graph facts.";
      }

      function formatActivityLine(line) {
        const match = String(line).match(/^(\d{10})\s+(.*)$/);
        if (!match) return line;
        const date = new Date(Number(match[1]) * 1000);
        if (Number.isNaN(date.getTime())) return line;
        return date.toLocaleString() + " - " + match[2];
      }

      function parseSparqlResult(text) {
        const raw = text.trim();
        if (!raw) return { rows: [], columns: [], raw: "Update completed without a result body." };
        if (raw.startsWith("{")) {
          try {
            const parsed = JSON.parse(raw);
            const rows = Array.isArray(parsed.rows) ? parsed.rows : [];
            const columns = Array.isArray(parsed.columns) && parsed.columns.length
              ? parsed.columns
              : ["s", "p", "o", "g"];
            return { rows, columns, raw };
          } catch (_) {
          }
        }
        try {
          const doc = new DOMParser().parseFromString(raw, "application/xml");
          if (doc.querySelector("parsererror")) throw new Error("not xml");
          const columns = Array.from(doc.querySelectorAll("head variable"))
            .map((node) => node.getAttribute("name"))
            .filter(Boolean);
          const rows = Array.from(doc.querySelectorAll("results result")).map((result) => {
            const row = {};
            result.querySelectorAll("binding").forEach((binding) => {
              const name = binding.getAttribute("name");
              const valueNode = binding.querySelector("literal, uri, bnode");
              row[name] = valueNode ? valueNode.textContent : "";
            });
            return row;
          });
          if (columns.length && rows.length) return { rows, columns, raw };
        } catch (_) {
        }
        return { rows: [], columns: [], raw };
      }

      function filterGraphRows(rows, filters) {
        return rows.filter((row) => {
          const predicate = compactLabel(row.p || "");
          const joined = [row.s, row.p, row.o].join(" ");
          if (!filters.literals && row.o && !looksLikeIri(row.o)) return false;
          if (!filters.typeEdges && (predicate === "type" || row.p === "http://www.w3.org/1999/02/22-rdf-syntax-ns#type")) return false;
          if (!filters.evidence && /Evidence|Vulnerability|Hypothesis|Probe|Signal|CVE|hasVulnerability|imports|calls|references|definedIn|dependsOnPackage/.test(joined)) {
            return false;
          }
          return true;
        });
      }

      function formatSparql(text) {
        return String(text || "")
          .replace(/\s+/g, " ")
          .replace(/\s*{\s*/g, " {\n  ")
          .replace(/\s*\.\s*/g, " .\n  ")
          .replace(/\s*}\s*/g, "\n}")
          .replace(/\b(WHERE|ORDER BY|LIMIT|FILTER|SELECT|PREFIX)\b/g, "\n$1")
          .replace(/^\s+/, "")
          .replace(/\n{3,}/g, "\n\n")
          .trim();
      }

      function rowsFromTriples(triples) {
        return triples.map((triple) => ({
          s: triple[0],
          p: triple[1],
          o: triple[2],
          g: "urn:graph:prefilled",
        }));
      }

      function rowKey(row, index) {
        return [index, row.s || "", row.p || "", row.o || "", row.g || ""].join("\u001f");
      }

      function rowIndexFromKey(key) {
        if (!key) return -1;
        const value = Number(String(key).split("\u001f", 1)[0]);
        return Number.isFinite(value) ? value : -1;
      }

      function nodeQueryTemplates(node) {
        const term = ntTerm(node);
        return [
          {
            label: "Neighborhood",
            query: "SELECT * WHERE { { " + term + " ?p ?o } UNION { ?s ?p " + term + " } }",
          },
          {
            label: "Outgoing",
            query: "SELECT * WHERE { " + term + " ?p ?o }",
          },
          {
            label: "Incoming",
            query: "SELECT * WHERE { ?s ?p " + term + " }",
          },
          {
            label: "Types",
            query: "SELECT * WHERE { " + term + " <http://www.w3.org/1999/02/22-rdf-syntax-ns#type> ?o }",
          },
          {
            label: "Evidence",
            query: "SELECT * WHERE { { " + term + " <http://omrya.local/avr/supportedByEvidence> ?o } UNION { ?s <http://omrya.local/avr/supportedByEvidence> " + term + " } }",
          },
        ];
      }

      function graphRowsForVisualization(rows) {
        const maxEdges = 96;
        const entries = rows.map((row, index) => ({
          row,
          index,
          score: graphRowScore(row),
        }));
        if (entries.length <= 90) return entries;

        const selected = entries
          .filter((entry) => entry.score > 0)
          .sort((a, b) => b.score - a.score || a.index - b.index)
          .slice(0, maxEdges);

        if (selected.length >= Math.min(40, entries.length)) {
          return selected.sort((a, b) => a.index - b.index);
        }

        return entries
          .sort((a, b) => b.score - a.score || a.index - b.index)
          .slice(0, Math.min(maxEdges, entries.length))
          .sort((a, b) => a.index - b.index);
      }

      function graphRowScore(row) {
        const predicate = compactLabel(row.p || "");
        const joined = [row.s, row.p, row.o].join(" ");
        if (isNoisyGraphPredicate(predicate)) return -20;
        if (!looksLikeIri(row.o) && rowsNeedThinningContext(joined)) return -10;
        if (/hasHypothesis|generatedProbe|targetsComponent|supportedByEvidence|mutatedBy|failureClass|observedSignal|triggered|minimizedTo|derivedFrom|replaysAs|belongsToCluster|proposedPatch|analyzesRepository|usesComponent|hasComponent/.test(predicate)) return 100;
        if (/VulnerabilityHypothesis|CodeQueryProbe|Evidence|Repository|SourceFile|Campaign|AgentRun|MemoryGraph/.test(joined)) return 75;
        if (/containsFile/.test(predicate)) return 18;
        if (looksLikeIri(row.s) && looksLikeIri(row.o)) return 35;
        return 5;
      }

      function rowsNeedThinningContext(value) {
        return /repo-|VulnerabilityHypothesis|CodeQueryProbe|Evidence|Repository|SourceFile|Campaign|code\//.test(value);
      }

      function isNoisyGraphPredicate(predicate) {
        return /^(snippet|line|lineCount|language|path|sourceTarget|indexedFileCount|objective|authorizedScope|queryIntent|plainEnglish)$/.test(predicate);
      }

      function shouldLabelGraphNode(value, degree, edgeCount) {
        if (!looksLikeIri(value)) return false;
        if (edgeCount <= 60) return true;
        if (degree >= 4) return true;
        return /campaign|repo\/|hypothesis|probe|signature|cluster|component|runtime|memory\/kg/.test(value);
      }

      function normalizeRepoTarget(value, mode) {
        const trimmed = value.trim();
        if (mode === "local" || /^https?:\/\//i.test(trimmed) || trimmed.startsWith("/")) return trimmed;
        const cleaned = trimmed.replace(/^github\.com\//i, "").replace(/\.git$/i, "");
        if (/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(cleaned)) {
          return "https://github.com/" + cleaned + ".git";
        }
        return trimmed;
      }

      function applyGraphHighlight(graph, renderer, rowNodes, selectedRowKey, hoveredRowKey, selectedNode) {
        const activeKey = hoveredRowKey || selectedRowKey;
        const selectedNodes = new Set(rowNodes.get(selectedRowKey) || []);
        const activeNodes = new Set(rowNodes.get(activeKey) || []);
        graph.forEachNode((node, attrs) => {
          const active = activeNodes.has(node) || node === selectedNode;
          const selected = selectedNodes.has(node) || node === selectedNode;
          const baseSize = attrs.baseSize || attrs.size || 9;
          if (!attrs.baseSize) graph.setNodeAttribute(node, "baseSize", baseSize);
          if (attrs.baseLabel === undefined) graph.setNodeAttribute(node, "baseLabel", attrs.label || "");
          if (!attrs.baseColor) graph.setNodeAttribute(node, "baseColor", attrs.color);
          graph.setNodeAttribute(node, "highlighted", active || selected);
          graph.setNodeAttribute(node, "size", active ? baseSize + 4 : selected ? baseSize + 3 : baseSize);
          graph.setNodeAttribute(node, "color", active ? "#7dd3fc" : selected ? "#69df78" : attrs.baseColor || attrs.color);
          graph.setNodeAttribute(node, "label", active || selected ? compactLabel(node) : attrs.baseLabel || "");
          graph.setNodeAttribute(node, "labelColor", active || selected ? "#f8fbff" : "#d8e5ef");
        });
        graph.forEachEdge((edge, attrs) => {
          const key = attrs.rowKey;
          const active = key && key === activeKey;
          const selected = key && key === selectedRowKey;
          const baseSize = attrs.baseSize || attrs.size || 1.5;
          if (!attrs.baseSize) graph.setEdgeAttribute(edge, "baseSize", baseSize);
          if (!attrs.baseColor) graph.setEdgeAttribute(edge, "baseColor", attrs.color);
          graph.setEdgeAttribute(edge, "size", active ? 4 : selected ? 3 : baseSize);
          graph.setEdgeAttribute(edge, "color", active ? "#d8f3ff" : selected ? "#69df78" : attrs.baseColor || attrs.color);
        });
        renderer.refresh();
      }

      function drawReadableHoverLabel(context, data, settings) {
        const label = data.label || "";
        if (!label) return;
        const fontSize = Number(settings.labelSize) || 11;
        const font = settings.labelFont || "SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace";
        const x = data.x + (data.size || 6) + 8;
        const y = data.y - fontSize - 7;
        const padX = 8;
        const padY = 5;
        context.save();
        context.font = "700 " + fontSize + "px " + font;
        const width = Math.ceil(context.measureText(label).width + padX * 2);
        const height = Math.ceil(fontSize + padY * 2);
        drawRoundRect(context, x, y, width, height, 5);
        context.fillStyle = "rgba(5, 13, 23, 0.96)";
        context.fill();
        context.strokeStyle = data.color || "#2f9cff";
        context.lineWidth = 1.2;
        context.stroke();
        context.fillStyle = "#f8fbff";
        context.textBaseline = "middle";
        context.fillText(label, x + padX, y + height / 2);
        context.restore();
      }

      function drawRoundRect(context, x, y, width, height, radius) {
        const r = Math.min(radius, width / 2, height / 2);
        context.beginPath();
        context.moveTo(x + r, y);
        context.lineTo(x + width - r, y);
        context.quadraticCurveTo(x + width, y, x + width, y + r);
        context.lineTo(x + width, y + height - r);
        context.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
        context.lineTo(x + r, y + height);
        context.quadraticCurveTo(x, y + height, x, y + height - r);
        context.lineTo(x, y + r);
        context.quadraticCurveTo(x, y, x + r, y);
        context.closePath();
      }

      function summarizeRows(rows) {
        const text = rows.map((row) => [row.s, row.p, row.o].join(" ")).join(" ");
        const entities = new Set();
        let files = 0;
        rows.forEach((row) => {
          if (row.s) entities.add(row.s);
          if (row.o && looksLikeIri(row.o)) entities.add(row.o);
          if (/SourceFile|definedIn|containsFile|\.rs|\.ts|\.js|\.toml|package\.json/.test([row.s, row.p, row.o].join(" "))) files += 1;
        });
        return {
          edgeCount: rows.length,
          entityCount: entities.size,
          files,
          hypotheses: countMatches(text, /Hypothesis|hasHypothesis|hypothesis\//g),
          probes: countMatches(text, /Probe|generatedProbe|probe\//g),
          signals: countMatches(text, /Signal|observedSignal|signal\//g),
          reproducers: countMatches(text, /Reproducer|derivedReproducer|reproducer\//g),
          patches: countMatches(text, /Patch|proposedPatch|patch\//g),
          replayable: countMatches(text, /Evidence|supportedByEvidence|reproducer\//g),
        };
      }

      function countMatches(text, pattern) {
        return (text.match(pattern) || []).length;
      }

      function ntTerm(value) {
        return looksLikeIri(value) ? "<" + value + ">" : '"' + value.replace(/\\/g, "\\\\").replace(/"/g, '\\"') + '"';
      }

      function looksLikeIri(value) {
        return /^https?:\/\//.test(value) || /^urn:/.test(value);
      }

      function compactLabel(value) {
        if (!value) return "";
        const hash = value.lastIndexOf("#");
        const slash = value.lastIndexOf("/");
        const index = Math.max(hash, slash);
        return index >= 0 ? value.slice(index + 1) : value;
      }

      function parseMetrics(text) {
        return text.split("\n").reduce((map, line) => {
          const parts = line.trim().split(/\s+/);
          if (parts.length >= 2) map[parts[0]] = parts.slice(1).join(" ");
          return map;
        }, {});
      }

      render(h(App), document.getElementById("app"));
    </script>
  </body>
</html>
